<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>1:1 문의 | 에스디컴퍼니</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><script src="js/common.js"></script><script src="js/order-pages.js"></script></head><body><script>mountLayout('support.html');</script><main class="section"><div class="container"><div class="kicker">1:1 Inquiry</div><h1>회원가입 없이 1:1 문의하기</h1><p class="desc">작성한 문의는 sales@box.re.kr 로 자동 발송됩니다. 상담 내용을 자세히 적어주실수록 확인과 회신이 빨라집니다.</p><div class="inquiry-board-layout"><section class="inquiry-form-card"><h3>문의 작성</h3><form id="inquiryForm" class="order-form" action="https://formsubmit.co/sales@box.re.kr" method="POST" data-family="support" data-request-type="support"><input type="hidden" name="_subject" value="[에스디컴퍼니] 1:1 문의 접수"><input type="hidden" name="_captcha" value="false"><div class="form-row"><label>제목</label><input name="title" required placeholder="문의 제목을 입력해 주세요"></div><div class="form-row"><label>이름</label><input name="name" required placeholder="작성자 이름"></div><div class="form-row"><label>연락처</label><input name="phone" placeholder="회신 받을 연락처"></div><div class="form-row"><label>이메일</label><input name="email" type="email" placeholder="회신 받을 이메일"></div><div class="form-row"><label>문의내용</label><textarea name="content" rows="8" required placeholder="문의 내용을 입력해 주세요"></textarea></div><div class="form-hint">문의 내용은 목록형 게시판으로 공개하지 않고 담당 메일로 바로 전달됩니다.</div><div class="sample-footer-cta"><button class="btn primary" type="submit">문의 보내기</button></div></form></section><section class="inquiry-list-card"><div class="inquiry-list-head"><h3>안내</h3><span class="small">자동 메일 발송</span></div><div class="guide-section" style="padding:0;border:none;background:transparent;box-shadow:none"><p>문의 접수는 게시판 데모가 아니라 메일 수신형으로 변경되었습니다.</p><p><strong>수신 메일:</strong> sales@box.re.kr</p><p>제품명, 규격, 예상 수량, 인쇄 유무, 참고 이미지가 있으면 함께 적어 주세요.</p></div></section></div></div></main><script>attachMailForm('inquiryForm','문의가 전송되었습니다. 확인 후 회신드리겠습니다.');</script></body></html>
