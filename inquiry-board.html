<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>1:1 문의 게시판 | 에스디컴퍼니</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><script src="js/common.js"></script></head><body><script>mountLayout('support.html');</script><main class="section"><div class="container"><div class="kicker">1:1 Inquiry</div><h1>회원가입 없이 문의 남기기</h1><p class="desc">문의 내용은 브라우저에 저장되는 데모형 게시판입니다. 목록에는 제목만 노출되고, 상세 내용은 작성자만 같은 기기에서 다시 확인할 수 있도록 구성했습니다.</p><div class="inquiry-board-layout"><section class="inquiry-form-card"><h3>문의 작성</h3><form id="inquiryForm" class="order-form"><div class="form-row"><label>제목</label><input name="title" required placeholder="문의 제목을 입력해 주세요"></div><div class="form-row"><label>이름</label><input name="name" required placeholder="작성자 이름"></div><div class="form-row"><label>연락처</label><input name="phone" placeholder="회신 받을 연락처"></div><div class="form-row"><label>이메일</label><input name="email" type="email" placeholder="회신 받을 이메일"></div><div class="form-row"><label>비밀번호</label><input name="password" type="password" required placeholder="비밀글 확인용 비밀번호"></div><div class="form-row"><label>문의내용</label><textarea name="content" rows="7" required placeholder="문의 내용을 입력해 주세요"></textarea></div><div class="form-hint">목록에는 제목과 작성일만 표시됩니다. 비밀번호를 알아야 같은 기기에서 상세 내용을 다시 볼 수 있습니다.</div><div class="sample-footer-cta"><button class="btn primary" type="submit">문의 등록</button></div></form></section><section class="inquiry-list-card"><div class="inquiry-list-head"><h3>문의 목록</h3><span class="small">제목만 공개</span></div><div id="inquiryList" class="inquiry-list"></div></section></div></div></main><script src="js/inquiry-board.js"></script></body></html>
