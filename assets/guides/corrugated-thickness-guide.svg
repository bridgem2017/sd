    <g transform="translate(34,86)">
      <g><rect x="0" y="58" width="180" height="14" rx="7" fill="#d9b07a"/><path d="M0 58 C15 20, 45 20, 60 58 S105 96, 120 58 S165 20, 180 58" fill="none" stroke="#b37a41" stroke-width="10"/><rect x="0" y="86" width="180" height="14" rx="7" fill="#ead2ae"/><text x="0" y="-4" font-family="'Noto Sans KR', sans-serif" font-size="26" font-weight="900" fill="#17253c">E골</text><text x="0" y="126" font-family="'Noto Sans KR', sans-serif" font-size="20" fill="#586376">약 1.5 mm · 얇고 인쇄가 깔끔</text></g>
      <g transform="translate(240,0)"><rect x="0" y="48" width="180" height="14" rx="7" fill="#d1a36f"/><path d="M0 48 C20 0, 50 0, 70 48 S120 96, 140 48 S160 0, 180 48" fill="none" stroke="#a96d35" stroke-width="12"/><rect x="0" y="86" width="180" height="14" rx="7" fill="#ecd7b8"/><text x="0" y="-4" font-family="'Noto Sans KR', sans-serif" font-size="26" font-weight="900" fill="#17253c">B골</text><text x="0" y="126" font-family="'Noto Sans KR', sans-serif" font-size="20" fill="#586376">약 3 mm · 가장 보편적인 배송용</text></g>
