<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="960" viewBox="0 0 1400 960">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#fff9f2"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="960" rx="28" fill="url(#bg)" stroke="#eedccc"/>
  <text x="70" y="84" font-family="'Noto Sans KR', sans-serif" font-size="42" font-weight="900" fill="#17253c">골판지 두께 / 골 종류 안내</text>
  <text x="70" y="130" font-family="'Noto Sans KR', sans-serif" font-size="22" fill="#5c6676">골판지는 보통 표면지 + 골심지 + 이면지 구조로 이루어지며, 골 높이에 따라 완충성과 강도가 달라집니다.</text>

  <g transform="translate(70,180)">
