    <rect x="110" y="98" width="980" height="18" rx="9" fill="#c89c67"/>
    <path d="M110 160 C150 100, 190 100, 230 160 S310 220, 350 160 S430 100, 470 160 S550 220, 590 160 S670 100, 710 160 S790 220, 830 160 S910 100, 950 160 S1030 220, 1090 160" fill="none" stroke="#b07c46" stroke-width="14" stroke-linecap="round"/>
    <rect x="110" y="192" width="980" height="18" rx="9" fill="#d7b58a"/>
    <text x="1130" y="110" font-family="'Noto Sans KR', sans-serif" font-size="22" font-weight="800" fill="#8a541f">표면지</text>
    <text x="1130" y="168" font-family="'Noto Sans KR', sans-serif" font-size="22" font-weight="800" fill="#8a541f">골심지</text>
    <text x="1130" y="206" font-family="'Noto Sans KR', sans-serif" font-size="22" font-weight="800" fill="#8a541f">이면지</text>
  </g>

