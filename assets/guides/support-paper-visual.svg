<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760"><rect width="1200" height="760" rx="28" fill="#fff8f0" stroke="#eaded2"/><text x="60" y="90" font-family="'Noto Sans KR', sans-serif" font-size="40" font-weight="900" fill="#17253c">종이 선택 가이드</text><text x="60" y="135" font-family="'Noto Sans KR', sans-serif" font-size="22" fill="#5c6676">표면지 톤, 골 높이, 인쇄 결과를 비교해 보는 안내</text><g transform="translate(60,210)"><rect width="220" height="150" rx="24" fill="#b89b74"/><rect x="250" width="220" height="150" rx="24" fill="#d9d9d9"/><rect x="500" width="220" height="150" rx="24" fill="#d6d1ca"/><rect x="750" width="220" height="150" rx="24" fill="#c9d0d8"/></g><g transform="translate(60,405)" font-family="'Noto Sans KR', sans-serif"><rect width="1080" height="250" rx="24" fill="#fff" stroke="#eaded2"/><text x="36" y="56" font-size="28" font-weight="900" fill="#17253c">빠르게 보는 기준</text><text x="36" y="104" font-size="22" fill="#5c6676">크라프트 : 자연스럽고 내추럴한 분위기</text><text x="36" y="144" font-size="22" fill="#5c6676">화이트/아이보리 : 컬러 인쇄와 로고 표현이 선명</text><text x="36" y="184" font-size="22" fill="#5c6676">MGB/로얄아이보리 : 품질감과 프리미엄 인상에 유리</text><text x="36" y="224" font-size="22" fill="#5c6676">골 높이가 높을수록 완충성은 좋아지고, 얇을수록 접힘과 인쇄는 깔끔해집니다.</text></g></svg>