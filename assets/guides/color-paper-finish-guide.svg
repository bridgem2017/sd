<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <rect width="1400" height="860" rx="28" fill="#fffaf5" stroke="#eedccc"/>
  <text x="70" y="84" font-family="'Noto Sans KR', sans-serif" font-size="42" font-weight="900" fill="#17253c">칼라박스 종이 / 코팅 / 박인쇄 가이드</text>
  <text x="70" y="130" font-family="'Noto Sans KR', sans-serif" font-size="22" fill="#5c6676">종이의 톤과 표면처리, 후가공 포인트를 한 번에 비교할 수 있도록 정리했습니다.</text>
  <g transform="translate(70,180)">
    <rect width="1240" height="270" rx="24" fill="#fff" stroke="#eaded2"/>
    <text x="36" y="48" font-family="'Noto Sans KR', sans-serif" font-size="28" font-weight="900" fill="#17253c">대표 종이 재질</text>
    <g font-family="'Noto Sans KR', sans-serif">
      <g transform="translate(36,82)"><rect width="260" height="140" rx="22" fill="#cbbfae" stroke="#e4d8cb"/><text x="20" y="34" font-size="22" font-weight="900" fill="#17253c">SC마닐라지</text><text x="20" y="72" font-size="18" fill="#5c6676">가장 기본적인 단상자용 지류</text><text x="20" y="104" font-size="18" fill="#5c6676">가격/인쇄 밸런스가 좋아 첫 제작에 무난</text></g>
      <g transform="translate(332,82)"><rect width="260" height="140" rx="22" fill="#ddd6cd" stroke="#e4d8cb"/><text x="20" y="34" font-size="22" font-weight="900" fill="#17253c">아이보리지</text><text x="20" y="72" font-size="18" fill="#5c6676">밝고 깔끔한 화이트 계열</text><text x="20" y="104" font-size="18" fill="#5c6676">브랜드 컬러를 또렷하게 보여주기 좋음</text></g>
      <g transform="translate(628,82)"><rect width="260" height="140" rx="22" fill="#c9d0d8" stroke="#d9e1e8"/><text x="20" y="34" font-size="22" font-weight="900" fill="#17253c">MGB지</text><text x="20" y="72" font-size="18" fill="#5c6676">인쇄 품질이 뛰어난 편</text><text x="20" y="104" font-size="18" fill="#5c6676">채도 높은 컬러나 패턴 표현에 유리</text></g>
      <g transform="translate(924,82)"><rect width="260" height="140" rx="22" fill="#d6d1ca" stroke="#e5e1db"/><text x="20" y="34" font-size="22" font-weight="900" fill="#17253c">로얄아이보리지</text><text x="20" y="72" font-size="18" fill="#5c6676">차분하고 정돈된 고급 무드</text><text x="20" y="104" font-size="18" fill="#5c6676">프리미엄 브랜드 패키지와 잘 어울림</text></g>
    </g>
  </g>
  <g transform="translate(70,492)">
    <rect width="600" height="298" rx="24" fill="#fff" stroke="#eaded2"/>
    <text x="36" y="50" font-family="'Noto Sans KR', sans-serif" font-size="28" font-weight="900" fill="#17253c">코팅 비교</text>
    <g font-family="'Noto Sans KR', sans-serif" font-size="20">
      <rect x="36" y="84" width="248" height="78" rx="18" fill="#fff9f1" stroke="#f0ddca"/><text x="58" y="116" font-weight="900" fill="#17253c">오버코팅</text><text x="58" y="144" fill="#5c6676">가벼운 보호막 · 가성비 우수</text>
      <rect x="316" y="84" width="248" height="78" rx="18" fill="#fff" stroke="#f0ddca"/><text x="338" y="116" font-weight="900" fill="#17253c">유광 라미네이팅</text><text x="338" y="144" fill="#5c6676">광택이 강하고 색감이 또렷</text>
      <rect x="36" y="182" width="248" height="78" rx="18" fill="#f6f6f6" stroke="#dedede"/><text x="58" y="214" font-weight="900" fill="#17253c">무광 라미네이팅</text><text x="58" y="242" fill="#5c6676">차분하고 세련된 표면감</text>
      <rect x="316" y="182" width="248" height="78" rx="18" fill="#f7fbff" stroke="#d6e6f5"/><text x="338" y="214" font-weight="900" fill="#17253c">부분 UV</text><text x="338" y="242" fill="#5c6676">로고/문구만 반짝이게 강조</text>
    </g>
  </g>
  <g transform="translate(710,492)">
    <rect width="600" height="298" rx="24" fill="#fff" stroke="#eaded2"/>
    <text x="36" y="50" font-family="'Noto Sans KR', sans-serif" font-size="28" font-weight="900" fill="#17253c">박인쇄 포인트</text>
    <g font-family="'Noto Sans KR', sans-serif">
      <rect x="36" y="92" width="110" height="64" rx="18" fill="#d9b15f"/><text x="57" y="132" font-size="24" font-weight="900" fill="#fff">금박</text>
      <rect x="168" y="92" width="110" height="64" rx="18" fill="#a9b3c4"/><text x="189" y="132" font-size="24" font-weight="900" fill="#fff">은박</text>
      <rect x="300" y="92" width="110" height="64" rx="18" fill="#4b76c9"/><text x="321" y="132" font-size="24" font-weight="900" fill="#fff">청박</text>
      <rect x="432" y="92" width="110" height="64" rx="18" fill="#b35b3c"/><text x="453" y="132" font-size="24" font-weight="900" fill="#fff">동박</text>
      <rect x="36" y="188" width="506" height="70" rx="20" fill="#f9f4ff" stroke="#ece1ff"/><text x="58" y="218" font-size="22" font-weight="900" fill="#17253c">홀로그램 박</text><text x="58" y="246" font-size="18" fill="#5c6676">각도에 따라 반짝임이 달라 굿즈/이벤트 패키지 포인트에 적합</text>
    </g>
  </g>
</svg>