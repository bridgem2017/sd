<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760"><rect width="1200" height="760" rx="28" fill="#fff8f0" stroke="#eaded2"/><text x="60" y="90" font-family="'Noto Sans KR', sans-serif" font-size="40" font-weight="900" fill="#17253c">패키지 제작 과정</text><text x="60" y="135" font-family="'Noto Sans KR', sans-serif" font-size="22" fill="#5c6676">상담 → 설계 → 목형 → 인쇄 → 가공 → 출고 흐름을 쉽게 정리</text><g transform="translate(60,230)" font-family="'Noto Sans KR', sans-serif"><g><circle cx="70" cy="70" r="46" fill="#ff8d47"/><text x="52" y="80" font-size="28" font-weight="900" fill="#fff">1</text><text x="18" y="150" font-size="22" font-weight="900" fill="#17253c">상담/견적</text></g><g transform="translate(205,0)"><circle cx="70" cy="70" r="46" fill="#ffb36b"/><text x="52" y="80" font-size="28" font-weight="900" fill="#fff">2</text><text x="24" y="150" font-size="22" font-weight="900" fill="#17253c">구조 설계</text></g><g transform="translate(410,0)"><circle cx="70" cy="70" r="46" fill="#17253c"/><text x="52" y="80" font-size="28" font-weight="900" fill="#fff">3</text><text x="36" y="150" font-size="22" font-weight="900" fill="#17253c">목형 제작</text></g><g transform="translate(615,0)"><circle cx="70" cy="70" r="46" fill="#4e73b8"/><text x="52" y="80" font-size="28" font-weight="900" fill="#fff">4</text><text x="48" y="150" font-size="22" font-weight="900" fill="#17253c">인쇄</text></g><g transform="translate(820,0)"><circle cx="70" cy="70" r="46" fill="#62a96b"/><text x="52" y="80" font-size="28" font-weight="900" fill="#fff">5</text><text x="48" y="150" font-size="22" font-weight="900" fill="#17253c">가공</text></g><g transform="translate(1025,0)"><circle cx="70" cy="70" r="46" fill="#c97b3d"/><text x="52" y="80" font-size="28" font-weight="900" fill="#fff">6</text><text x="48" y="150" font-size="22" font-weight="900" fill="#17253c">출고</text></g><path d="M122 70 H220 M327 70 H425 M532 70 H630 M737 70 H835 M942 70 H1040" stroke="#d5b08a" stroke-width="10" stroke-linecap="round"/></g><g transform="translate(60,470)" font-family="'Noto Sans KR', sans-serif"><rect width="1080" height="170" rx="24" fill="#fff" stroke="#eaded2"/><text x="36" y="58" font-size="28" font-weight="900" fill="#17253c">실무 팁</text><text x="36" y="102" font-size="22" fill="#5c6676">맞춤 구조나 다이컷은 목형 단계가 추가되며, 인쇄와 후가공이 많을수록 납기가 늘어날 수 있습니다.</text><text x="36" y="142" font-size="22" fill="#5c6676">샘플 확인이 필요한 경우 설계 완료 후 테스트 샘플을 먼저 보는 것이 안전합니다.</text></g></svg>