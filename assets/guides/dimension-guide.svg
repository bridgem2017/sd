<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#fff8f1"/>
      <stop offset="100%" stop-color="#fff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="#ff6128"/>
    </marker>
  </defs>
  <rect width="1400" height="760" rx="28" fill="url(#bg)" stroke="#f0ddcd"/>
  <text x="70" y="90" font-family="'Noto Sans KR', sans-serif" font-size="40" font-weight="900" fill="#17253c">박스 외측 사이즈 표기 안내</text>
  <text x="70" y="138" font-family="'Noto Sans KR', sans-serif" font-size="22" fill="#5c6676">장(가로) × 폭(세로) × 고(높이) 순서로 입력해 주세요.</text>
  <image href="../reference/size-box.png" x="70" y="180" width="560" height="360" preserveAspectRatio="xMidYMid meet"/>
  <line x1="110" y1="565" x2="480" y2="620" stroke="#ff6128" stroke-width="6" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="242" y="675" font-family="'Noto Sans KR', sans-serif" font-size="34" font-weight="900" fill="#ff6128">장(가로)</text>
  <line x1="500" y1="562" x2="625" y2="555" stroke="#ff6128" stroke-width="6" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="502" y="612" font-family="'Noto Sans KR', sans-serif" font-size="34" font-weight="900" fill="#ff6128">폭(세로)</text>
  <line x1="636" y1="220" x2="636" y2="520" stroke="#ff6128" stroke-width="6" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="663" y="385" font-family="'Noto Sans KR', sans-serif" font-size="34" font-weight="900" fill="#ff6128">고(높이)</text>

  <g transform="translate(740,170)">
    <rect width="580" height="430" rx="24" fill="#fff" stroke="#eaded2"/>
    <text x="36" y="66" font-family="'Noto Sans KR', sans-serif" font-size="28" font-weight="900" fill="#17253c">치수 입력 전 체크 포인트</text>
    <circle cx="46" cy="126" r="7" fill="#ff6128"/><text x="70" y="136" font-family="'Noto Sans KR', sans-serif" font-size="24" fill="#2b3242">규격은 <tspan font-weight="900" fill="#ff6128">외측 사이즈 기준</tspan>입니다.</text>
    <circle cx="46" cy="196" r="7" fill="#ff6128"/><text x="70" y="206" font-family="'Noto Sans KR', sans-serif" font-size="24" fill="#2b3242">골 두께에 따라 내측 치수는 달라질 수 있습니다.</text>
    <circle cx="46" cy="266" r="7" fill="#ff6128"/><text x="70" y="276" font-family="'Noto Sans KR', sans-serif" font-size="24" fill="#2b3242">제품 크기와 완충 여유까지 함께 고려해 주세요.</text>
    <circle cx="46" cy="336" r="7" fill="#ff6128"/><text x="70" y="346" font-family="'Noto Sans KR', sans-serif" font-size="24" fill="#2b3242">정확한 견적을 위해 예상 수량도 같이 입력해 주세요.</text>
    <rect x="36" y="372" width="508" height="34" rx="17" fill="#fff4e8"/>
    <text x="60" y="396" font-family="'Noto Sans KR', sans-serif" font-size="18" font-weight="700" fill="#a2521b">예시 : 320 × 220 × 120 mm</text>
  </g>
</svg>