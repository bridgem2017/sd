<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760"><rect width="1200" height="760" rx="28" fill="#fff8f0" stroke="#eaded2"/><text x="60" y="90" font-family="'Noto Sans KR', sans-serif" font-size="40" font-weight="900" fill="#17253c">박스 구조 종류</text><text x="60" y="135" font-family="'Noto Sans KR', sans-serif" font-size="22" fill="#5c6676">출고형 · 오픈형 · 선물형 · 다이컷 구조를 한눈에 비교</text><g transform="translate(60,200)" font-family="'Noto Sans KR', sans-serif"><rect width="240" height="180" rx="24" fill="#fff" stroke="#eaded2"/><rect x="32" y="48" width="176" height="90" rx="18" fill="#d3a06b"/><path d="M32 78 h176" stroke="#b47a42" stroke-width="10"/><text x="32" y="160" font-size="24" font-weight="900" fill="#17253c">일반형 / 택배형</text></g><g transform="translate(340,200)" font-family="'Noto Sans KR', sans-serif"><rect width="240" height="180" rx="24" fill="#fff" stroke="#eaded2"/><rect x="36" y="54" width="168" height="76" rx="18" fill="#efbb84"/><rect x="50" y="36" width="140" height="28" rx="14" fill="#f8d5af"/><text x="36" y="160" font-size="24" font-weight="900" fill="#17253c">오픈형 / 트레이형</text></g><g transform="translate(620,200)" font-family="'Noto Sans KR', sans-serif"><rect width="240" height="180" rx="24" fill="#fff" stroke="#eaded2"/><rect x="38" y="68" width="164" height="64" rx="18" fill="#d79e68"/><rect x="52" y="40" width="136" height="36" rx="18" fill="#eec08e"/><text x="36" y="160" font-size="24" font-weight="900" fill="#17253c">뚜껑형 / 선물형</text></g><g transform="translate(900,200)" font-family="'Noto Sans KR', sans-serif"><rect width="240" height="180" rx="24" fill="#fff" stroke="#eaded2"/><path d="M48 60 h144 l28 36 -28 36 H48 l-28 -36z" fill="#d9a774"/><text x="36" y="160" font-size="24" font-weight="900" fill="#17253c">다이컷 / 맞춤형</text></g><g transform="translate(60,460)" font-family="'Noto Sans KR', sans-serif"><rect width="1080" height="190" rx="24" fill="#fff" stroke="#eaded2"/><text x="36" y="62" font-size="28" font-weight="900" fill="#17253c">선택 팁</text><text x="36" y="106" font-size="22" fill="#5c6676">무게와 적재가 중요하면 기본형, 진열이나 개봉 경험이 중요하면 뚜껑형/다이컷형부터 비교하는 것이 빠릅니다.</text><text x="36" y="146" font-size="22" fill="#5c6676">같은 크기라도 구조에 따라 조립성, 단가, 인쇄 활용면이 달라집니다.</text></g></svg>