<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>문의 완료 | 브릿지엠</title>
<style>
body{margin:0;font-family:'Noto Sans KR',sans-serif;background:#f7f3ed;color:#16284a;}
.wrap{max-width:760px;margin:0 auto;padding:80px 24px;text-align:center;}
.card{background:#fff;border:1px solid #ead9c7;border-radius:28px;padding:48px 28px;box-shadow:0 24px 60px rgba(22,40,74,.08);}
h1{margin:0 0 12px;font-size:42px;line-height:1.15;letter-spacing:-0.04em;}
p{margin:0;color:#6f7d93;font-size:18px;line-height:1.8;}
.actions{margin-top:28px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 22px;border-radius:999px;font-weight:800;text-decoration:none;}
.btn.primary{background:#f7963c;color:#fff;}
.btn.secondary{background:#fff;color:#16284a;border:1px solid #e4d4c0;}
@media (max-width:768px){.wrap{padding:40px 16px}.card{padding:34px 18px}h1{font-size:32px}p{font-size:16px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>문의가 정상 접수되었습니다.</h1>
    <p>입력하신 내용을 확인한 뒤 빠르게 회신드리겠습니다.</p>
    <div class="actions">
      <a class="btn primary" href="index.html">홈으로 이동</a>
      <a class="btn secondary" href="support.html">추가 문의하기</a>
    </div>
  </div>
</div>
</body>
</html>
