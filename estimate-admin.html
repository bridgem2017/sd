<script>
const PASSWORD = "1234"; // 👉 원하는 비번으로 변경

let priceTable = JSON.parse(localStorage.getItem("priceTable") || "{}");

function login(){
  const pw = document.getElementById("pw").value;
  if(pw === PASSWORD){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";
  }else{
    alert("비밀번호 틀림");
  }
}

/* 골유형별 지종 */
const fluteMap = {
  A:["KLB.K.K","SK.K.K","SK.CK.K","SK.S.K"],
  B:["KLB.K.K","SK.S.K"],
  E:["SK.S.K","KLB.K.K"],
  BA:["KLB.S.S.S.K","SK.S.S.S.K","KLB.S.S.K.K","SK.S.S.K.K"],
  BB:["KLB.S.S.S.K","KLB.S.S.K.K"],
  EB:["WK.S.S.S.K"]
};

function updatePaper(){
  const flute = document.getElementById("flute").value;
  const select = document.getElementById("paper");
  select.innerHTML="";
  fluteMap[flute].forEach(p=>{
    let op = document.createElement("option");
    op.value=p;
    op.textContent=p;
    select.appendChild(op);
  });
}

/* 원단폭 계산 */
function getSheetWidth(height){
  let widths=[];
  
  for(let i=950;i<=1800;i+=50){ widths.push(i); }
  for(let i=1900;i<=3000;i+=100){ widths.push(i); }

  for(let w of widths){
    let count = Math.floor(w / height);
    let used = count * height;

    if(count>0){
      if(w-used >= -15){
        return {width:w,count};
      }
    }
  }

  return {width:widths[widths.length-1],count:1};
}

/* 계산 */
function calculate(){
  let L = Number(document.getElementById("L").value);
  let W = Number(document.getElementById("W").value);
  let H = Number(document.getElementById("H").value);

  let flute = document.getElementById("flute").value;
  let paper = document.getElementById("paper").value;

  let price = Number(document.getElementById("price").value);

  if(!price){
    alert("단가 입력해줘");
    return;
  }

  let width = (L+W)*2 + 35;
  let height = (W+H) + 4;

  let sheet = getSheetWidth(height);

  let result =
    (width/1000) *
    (sheet.width/1000) *
    price /
    sheet.count;

  document.getElementById("result").innerHTML =
    `
    가로길이: ${width} mm <br>
    세로길이: ${height} mm <br>
    원단폭: ${sheet.width} mm <br>
    생산개수: ${sheet.count} 개 <br><br>
    👉 최종단가: <b>${Math.round(result)} 원</b>
    `;
}

/* 단가 저장 */
function savePrice(){
  let flute = document.getElementById("flute").value;
  let paper = document.getElementById("paper").value;
  let price = document.getElementById("price").value;

  priceTable[flute+"_"+paper] = price;
  localStorage.setItem("priceTable",JSON.stringify(priceTable));

  alert("저장됨");
}

/* 불러오기 */
function loadPrice(){
  let flute = document.getElementById("flute").value;
  let paper = document.getElementById("paper").value;

  let key = flute+"_"+paper;
  document.getElementById("price").value = priceTable[key] || "";
}
</script>

<div id="loginBox">
  <input id="pw" placeholder="비밀번호">
  <button onclick="login()">확인</button>
</div>

<div id="app" style="display:none;">

<h2>견적 산출</h2>

장 <input id="L"><br>
폭 <input id="W"><br>
고 <input id="H"><br><br>

골유형
<select id="flute" onchange="updatePaper();loadPrice();">
  <option>A</option>
  <option>B</option>
  <option>E</option>
  <option>BA</option>
  <option>BB</option>
  <option>EB</option>
</select><br><br>

지종배합
<select id="paper" onchange="loadPrice();"></select><br><br>

단가
<input id="price"><br>
<button onclick="savePrice()">단가 저장</button>

<br><br>

<button onclick="calculate()">계산하기</button>

<div id="result"></div>

</div>

<script>
updatePaper();
</script>
