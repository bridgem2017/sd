<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><title>관리자 견적산출기 | 에스디컴퍼니</title><link href="https://fonts.googleapis.com" rel="preconnect"/><link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&amp;display=swap" rel="stylesheet"/><link href="styles.css" rel="stylesheet"/><script src="js/common.js"></script></head><body><main class="section"><div class="container"><div class="kicker">Admin</div><h1>견적 문의 자동 산출 확인</h1><p class="desc">링크를 별도로 노출하지 않는 관리자 확인용 페이지입니다. 저장된 견적 문의만 간단 계산값과 함께 확인할 수 있습니다.</p><div class="order-form-card" id="adminGate" style="max-width:520px"><div class="form-row"><label>관리자 비밀번호</label><input id="adminPw" placeholder="비밀번호를 입력해 주세요" type="password"/></div><div class="sample-footer-cta"><button class="btn primary" id="adminLoginBtn" type="button">확인</button></div></div><div id="adminApp" style="display:none"><div class="guide-section" style="margin-bottom:18px"><h3>저장된 견적 문의</h3><p>문의 저장은 동일 브라우저 기준 로컬 저장 방식입니다. 메일 발송과 별도로 관리자 참고용 자동 산출값을 보여줍니다.</p></div><div style="overflow:auto"><table class="admin-table"><thead><tr><th>접수일시</th><th>구분</th><th>형태</th><th>제품</th><th>규격</th><th>수량</th><th>연락처</th><th>예상 단가</th><th>예상 총액</th></tr></thead><tbody id="adminRows"></tbody></table></div></div></div></main><script>(function(){const PW='sd2026admin';const btn=document.getElementById('adminLoginBtn');const pw=document.getElementById('adminPw');const app=document.getElementById('adminApp');const gate=document.getElementById('adminGate');const rows=document.getElementById('adminRows');function fmt(n){return Number(n||0).toLocaleString('ko-KR');}function render(){const items=loadEstimateSubmissions().filter(v=>v.requestType==='quote');if(!items.length){rows.innerHTML='<tr><td colspan="9">저장된 견적 문의가 없습니다.</td></tr>';return;}rows.innerHTML=items.map(item=>`<tr><td>${(item.createdAt||'').replace('T',' ').slice(0,16)}</td><td>${item.family==='colorbox'?'칼라박스':'골판지박스'}</td><td>${item.shape||''}</td><td>${item.product||''}</td><td>${[item.width,item.depth,item.height].filter(Boolean).join(' × ')}</td><td>${item.qty||''}</td><td>${item.name||''}<br>${item.phone||''}</td><td>${fmt(item.estimatedUnitPrice)}원</td><td>${fmt(item.estimatedTotalPrice)}원</td></tr>`).join('');}btn.addEventListener('click',()=>{if(pw.value!==PW){alert('비밀번호가 올바르지 않습니다.');return;}gate.style.display='none';app.style.display='block';render();});})();</script></body></html>
