<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>제품 분류 | 에스디컴퍼니</title><meta name="description" content="산업군별 박스 DB와 박스 추천 알고리즘을 함께 제공합니다."><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><script src="config/site-config.js"></script><script src="config/box-db.js"></script><script src="js/common.js"></script></head><body><main class="section subpage-hero"><div class="container"><div class="kicker">제품 분류</div><h1>제품 분류</h1><p>산업군별 박스 DB와 박스 추천 알고리즘을 함께 제공합니다.</p><div class="link-card" style="margin-top:24px"><h3>박스 추천 알고리즘</h3><p>형태, 업종, 수량, 인쇄 수준을 기준으로 적합한 박스군을 먼저 추리고, 내부 규격과 최소 수량 조건에 맞는 DB를 노출하는 구조입니다.</p></div><div class="tabs" id="filterTabs" style="margin-top:24px"></div><div class="grid-4" id="dbGrid" style="margin-top:24px"></div></div></main><script>mountLayout('support.html'); const mode='industry'; const order = mode==='industry' ? ['전체','식품','화장품','패션','의료','교육','물류','쇼핑몰','기타'] : ['골판지박스','칼라박스','싸바리박스','기타']; let active=order[0]; function renderTabs(){ document.getElementById('filterTabs').innerHTML = order.map(v=>`<a class="tab ${active===v?'active':''}" href="#" onclick="active='${v}';renderTabs();renderGrid();return false">${v}</a>`).join(''); } function renderGrid(){ const arr = SD_BOX_DB.filter(b=> mode==='industry' ? (active==='전체'||b.industry===active) : b.category===active); document.getElementById('dbGrid').innerHTML = arr.slice(0,24).map(b=>`<article class="card"><img src="${b.img}" alt="${b.name}"><div class="body"><h4>${b.name}</h4><p>${b.width}×${b.length}×${b.height}mm · ${b.flute}</p><div class="tag-row"><span class="tag">${b.use}</span><span class="tag">최소 ${b.minQty}개</span></div><div style="margin-top:12px"><a class="btn primary" href="quote.html?box=${encodeURIComponent(b.name)}&size=${b.width}x${b.length}x${b.height}&flute=${encodeURIComponent(b.flute)}">견적문의로 연결</a></div></div></article>`).join(''); } renderTabs(); renderGrid();</script></body></html>
