<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>박스 보관서비스 | 에스디컴퍼니</title><meta name="description" content="박스 보관장소가 부족한 경우 에스디컴퍼니 자체 창고에서 안전하게 보관하고 원하는 일정에 맞춰 납품하는 서비스"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><script src="config/site-config.js"></script><script src="js/common.js"></script></head><body><main class="section"><div class="container"><div class="storage-service-layout"><section class="storage-gallery storage-gallery-clean"><div class="storage-main storage-carousel"><button class="storage-nav prev" type="button" aria-label="이전 이미지">‹</button><img id="storageMainImage" src="assets/guides/storage_2.jpg" alt="박스를 안전하게 적재 보관하는 창고 이미지"><button class="storage-nav next" type="button" aria-label="다음 이미지">›</button><div class="storage-dots" id="storageDots"></div></div><div class="storage-thumbs" id="storageThumbs"></div></section><section class="storage-copy"><span class="storage-kicker">SERVICE</span><h1>박스보관 서비스</h1><p class="storage-quote">보관공간이 부족한 고객사를 위한 서비스</p><p>박스 보관장소가 부족한 경우, 에스디컴퍼니의 자체 창고에 안전하게 보관해드리며, 희망하는 수량과 날짜에 맞춰 납품을 해드리는 서비스 입니다.</p><div class="storage-points"><div class="storage-point"><strong>자체 창고 보관</strong><span>제작된 박스를 안전하게 적재 보관합니다.</span></div><div class="storage-point"><strong>원하는 수량 출고</strong><span>한 번에 전량 납품하지 않고 필요한 수량만 분할 출고할 수 있습니다.</span></div><div class="storage-point"><strong>일정 맞춤 납품</strong><span>희망 날짜에 맞춰 현장 일정과 보관 계획을 함께 조정합니다.</span></div></div><a class="btn primary" href="https://box.re.kr/inquiry-board.html">보관 문의하기</a></section></div></div></main><script>mountLayout('storage-service.html');document.addEventListener('DOMContentLoaded',()=>{const images=['assets/guides/storage_1.jpg','assets/guides/storage_2.jpg','assets/guides/storage_3.jpg','assets/guides/storage_4.jpg','assets/guides/storage_5.jpg'];const main=document.getElementById('storageMainImage');const dotsWrap=document.getElementById('storageDots');const thumbsWrap=document.getElementById('storageThumbs');const prev=document.querySelector('.storage-nav.prev');const next=document.querySelector('.storage-nav.next');let idx=0,timer;function renderDots(){dotsWrap.innerHTML=images.map((_,i)=>`<button type="button" class="storage-dot ${i===idx?'active':''}" data-idx="${i}" aria-label="${i+1}번 이미지"></button>`).join('');dotsWrap.querySelectorAll('.storage-dot').forEach(btn=>btn.addEventListener('click',()=>{show(Number(btn.dataset.idx));restart();}));}function renderThumbs(){thumbsWrap.innerHTML=images.map((src,i)=>`<button type="button" class="storage-thumb ${i===idx?'active':''}" data-idx="${i}" aria-label="${i+1}번 이미지 보기"><img src="${src}" alt="창고 보관 이미지 ${i+1}"></button>`).join('');thumbsWrap.querySelectorAll('.storage-thumb').forEach(btn=>btn.addEventListener('click',()=>{show(Number(btn.dataset.idx));restart();}));}function show(i){idx=(i+images.length)%images.length;main.src=images[idx];renderDots();renderThumbs();}function restart(){clearInterval(timer);timer=setInterval(()=>show(idx+1),3200);}prev?.addEventListener('click',()=>{show(idx-1);restart();});next?.addEventListener('click',()=>{show(idx+1);restart();});show(0);restart();});</script></body></html>
