<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>박스 보관서비스 | 에스디컴퍼니</title><meta name="description" content="박스 보관장소가 부족한 경우 에스디컴퍼니 자체 창고에서 안전하게 보관하고 원하는 일정에 맞춰 납품하는 서비스"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><script src="config/site-config.js"></script><script src="js/common.js"></script></head><body><main class="section"><div class="container"><div class="storage-service-layout"><section class="storage-gallery"><div class="storage-main"><img id="storageMainImage" src="assets/guides/storage_1.jpg" alt="빠레트 렉에 적재된 박스 보관 창고"></div><div class="storage-thumbs" id="storageThumbs"><button class="storage-thumb active" type="button" data-img="assets/guides/storage_1.jpg"><img src="assets/guides/storage_1.jpg" alt="보관서비스 이미지 1"></button><button class="storage-thumb" type="button" data-img="assets/guides/storage_2.jpg"><img src="assets/guides/storage_2.jpg" alt="보관서비스 이미지 2"></button><button class="storage-thumb" type="button" data-img="assets/guides/storage_3.jpg"><img src="assets/guides/storage_3.jpg" alt="보관서비스 이미지 3"></button><button class="storage-thumb" type="button" data-img="assets/guides/storage_4.jpg"><img src="assets/guides/storage_4.jpg" alt="보관서비스 이미지 4"></button><button class="storage-thumb" type="button" data-img="assets/guides/storage_5.jpg"><img src="assets/guides/storage_5.jpg" alt="보관서비스 이미지 5"></button></div></section><section class="storage-copy"><span class="storage-kicker">SERVICE</span><h1>박스보관 서비스</h1><p class="storage-quote">“보관 공간이 부족하신가요?”</p><p>박스 보관장소가 부족한 경우, 에스디컴퍼니의 자체 창고에 안전하게 보관해드리며, 희망하는 수량과 날짜에 맞춰 납품을 해드리는 서비스 입니다.</p><div class="storage-points"><div class="storage-point"><strong>자체 창고 보관</strong><span>제작된 박스를 팔레트렉 환경에서 안전하게 적재 보관합니다.</span></div><div class="storage-point"><strong>원하는 수량 출고</strong><span>한 번에 전량 납품하지 않고 필요한 수량만 분할 출고할 수 있습니다.</span></div><div class="storage-point"><strong>일정 맞춤 납품</strong><span>희망 날짜에 맞춰 현장 일정과 보관 계획을 함께 조정합니다.</span></div></div><a class="btn primary" href="quote_corrugated.html?focus=form">보관 문의하기</a></section></div></div></main><script>mountLayout('storage-service.html');document.addEventListener('DOMContentLoaded',()=>{const main=document.getElementById('storageMainImage');const thumbs=[...document.querySelectorAll('.storage-thumb')];let idx=0;function show(i){idx=(i+thumbs.length)%thumbs.length;const src=thumbs[idx].dataset.img;main.src=src;thumbs.forEach((t,n)=>t.classList.toggle('active',n===idx));}thumbs.forEach((t,n)=>t.addEventListener('click',()=>show(n)));setInterval(()=>show(idx+1),3500);});</script></body></html>
