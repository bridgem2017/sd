<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>칼라박스 견적문의 | 에스디컴퍼니</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap' rel='stylesheet'><link rel='stylesheet' href='styles.css'><script src='config/site-config.js'></script><script src='js/common.js'></script></head><body><main class='quote-shell'><div class='container'><div class='kicker'>COLOR BOX QUOTE</div><h1 style='font-size:54px;letter-spacing:-.05em;margin:10px 0 10px'>칼라박스 견적문의</h1><p class='desc' style='max-width:840px'>인쇄, 종이재질, 코팅, 옵션가공까지 한 번에 적을 수 있도록 칼라박스 전용 항목으로 분리했습니다.</p><div class='quote-wrap'><section class='quote-panel'><form action='https://formsubmit.co/sales@box.re.kr' method='POST'><div class='quote-form-grid'><div><label>박스형태</label><input id='boxType' name='box_type' readonly></div><div><label>사용제품</label><input name='product_use' required></div><div><label>제품무게</label><input name='product_weight' placeholder='예: 350g'></div><div class='field-full'><label>사이즈(외경) mm</label><div class='inline-3'><input name='size_width' placeholder='장(가로)'><input name='size_length' placeholder='폭(세로)'><input name='size_height' placeholder='고(높이)'></div></div><div><label>종이재질</label><select name='paper_type'><option>SC마닐라지</option><option>아이보리지</option><option>MGB지</option><option>로얄아이보리지</option><option>CCP지</option><option>뉴크라프트보드</option></select></div><div><label>골판지합지 유무</label><select name='corrugated_lamination'><option>없음</option><option>있음</option></select></div><div><label>인쇄 선택</label><select name='printing'><option>단면 4도</option><option>양면 4도</option><option>1도 인쇄</option><option>무인쇄</option></select></div><div><label>코팅선택</label><select name='coating'><option>오버코팅</option><option>CR코팅</option><option>유광 라미네이팅</option><option>무광 라미네이팅</option><option>없음</option></select></div><div><label>옵션가공</label><select name='finishing'><option>없음</option><option>금박</option><option>은박</option><option>형압</option><option>UV코팅</option><option>창문가공</option></select></div><div><label>수량</label><input name='quantity' required placeholder='예: 3000'></div><div><label>수령방법</label><select name='delivery_method'><option>직접 수령</option><option>화물 배송</option><option>택배 배송</option></select></div><div><label>지게차 유무</label><select name='forklift'><option>있음</option><option>없음</option></select></div><div><label>이메일</label><input type='email' name='reply_email' required></div><div><label>연락처</label><input name='phone' required></div><div class='field-full'><label>추가 요청사항</label><textarea name='message' placeholder='예: 합지 여부, 브랜드 컬러, 박 위치, 납기 일정 등'></textarea></div><input type='hidden' name='_subject' value='[box.re.kr] 칼라박스 견적문의'><input type='hidden' name='_captcha' value='false'><input type='hidden' name='_next' value='https://box.re.kr/support.html'></div><div style='margin-top:18px'><button class='btn primary quote-submit' type='submit'>견적요청</button></div></form></section><aside class='quote-panel'><div class='page-note'><strong style='display:block;margin-bottom:6px'>입력 팁</strong>칼라박스는 종이와 후가공 선택에 따라 인상이 크게 달라집니다. 아직 결정되지 않은 항목은 기본값으로 먼저 보내고, 상담 과정에서 조정하는 방식으로 시작해도 충분합니다.</div><div class='mini-spec'><div class='spec'>박스형태는 버튼 클릭 시 자동으로 채워집니다.</div><div class='spec'>사이즈는 외경 기준으로 정리해 주세요.</div><div class='spec'>합지 유무는 강도와 외형을 함께 좌우합니다.</div><div class='spec'>옵션가공이 많아질수록 제작 일정이 늘어날 수 있습니다.</div></div></aside></div></div></main><script>mountLayout('quote_colorbox.html');document.getElementById('boxType').value=new URLSearchParams(location.search).get('type')||'칼라박스';</script></body></html>
