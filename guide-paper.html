<section class="guide-content"><div class="hero-icon">✏️</div><h2>종이 선택 가이드</h2><div class="note-box">“같은 컨셉 종이인데, 왜 느낌이 이렇게 다르지?” 인쇄에 사용되는 종이는 재질과 두께에 따라 결과가 달라집니다. 브랜드 분위기에 맞는 종이를 골라보세요.</div><img src="assets/paper-compare.svg" alt="종이 비교" style="width:100%;border-radius:22px;border:1px solid var(--line);background:#fff"><h3 style="margin-top:26px">종이 재질에 따른 프린트 컬러 차이</h3><div class="guide-rows"><article class="card"><img src="assets/paper-compare.svg" alt="크라프트와 흰종이"><div class="body"><h4>크라프트</h4><p>자연스러운 노란 기가 돌아 차분한 인상을 줍니다.</p></div></article><article class="card"><img src="assets/paper-compare.svg" alt="흰 종이"><div class="body"><h4>흰 종이</h4><p>브랜드 컬러와 이미지를 선명하게 표현하기 좋습니다.</p></div></article></div><h3 style="margin-top:26px">🔎 종이별 특징 자세히 알아보기</h3><div class="guide-cards" id="paperCards"></div></section></div></main>
<script>mountLayout('support.html');document.getElementById('paperCards').innerHTML = DATA.paperGuideCards.map(i=>`<article class="guide-detail-card"><img src="${i.img}" alt="${i.name}"><div class="body" style="padding:14px"><h4>${i.name}</h4><div class="tag-row">${i.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div><p style="margin-top:8px">${i.desc}</p></div></article>`).join('');</script></body></html>
