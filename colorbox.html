<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>칼라박스</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><script src="config/site-config.js"></script><script src="config/site-data.js"></script><script src="js/common.js"></script></head><body><main><section class="page-hero"><div class="container"><div class="tabs"><a class="tab" href="all-products.html">전체</a><a class="tab active" href="colorbox.html">종이 박스</a><a class="tab" href="corrugated.html">골판지 박스</a><a class="tab" href="rigid.html">싸바리 박스</a><a class="tab" href="other.html">기타</a></div></div></section><section class="section" style="padding-top:28px"><div class="container filter-layout"><aside><div class="filter-box"><h4>최소 주문 수량</h4><label><input type="radio" checked> 전체</label><label><input type="radio"> 50개 이상</label><label><input type="radio"> 250개 이상</label></div><div class="filter-box"><label><input type="checkbox"> 맞춤 사이즈</label></div></aside><section><div class="product-grid" id="paperProductGrid"></div></section></div></section><section class="section" style="padding-top:10px"><div class="container"><div class="detail-section"><h3>1. 박스 형태 안내</h3><p class="desc">칼라박스는 구조 선택에 따라 첫인상이 크게 달라집니다. 소형 단상자부터 선물형 핸들 박스까지 다른 말투로 다시 설명했습니다.</p><div class="info-grid" id="colorGuideGrid"></div><div class="center-cta"><a class="btn primary" href="quote.html">견적페이지 이동</a></div></div><div class="detail-section"><h3>2. 칼라박스 종이 정보</h3><p class="desc">재질의 밝기와 결, 질감에 따라 인쇄 톤과 완성도가 달라집니다. 자주 검토되는 지류를 정리했습니다.</p><div class="info-grid" id="colorPaperGrid"></div></div><div class="detail-section"><h3>3. 가공 안내</h3><p class="desc">코팅, 라미네이팅, 박인쇄, 엠보싱, UV 등 후가공은 브랜드 인상을 또렷하게 만들어주는 요소입니다.</p><div class="info-grid" id="colorFinishGrid"></div></div></div></section></main><script>mountLayout('colorbox.html');document.getElementById('paperProductGrid').innerHTML=DATA.paperProducts.map(productCard).join('');document.getElementById('colorGuideGrid').innerHTML=DATA.colorGuide.map(i=>`<article class="info-card"><img src="${i.img}" alt="${i.name}"><div class="body"><h4>${i.name}</h4><p>${i.desc}</p></div></article>`).join('');document.getElementById('colorPaperGrid').innerHTML=DATA.colorPapers.map(i=>`<article class="info-card"><img src="${i.img}" alt="${i.name}"><div class="body"><h4>${i.name}</h4><p>${i.desc}</p></div></article>`).join('');document.getElementById('colorFinishGrid').innerHTML=DATA.colorFinishes.map(i=>`<article class="info-card"><img src="${i.img}" alt="${i.name}"><div class="body"><h4>${i.name}</h4><p>${i.desc}</p></div></article>`).join('');</script></body></html>
