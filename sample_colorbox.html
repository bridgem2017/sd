<!DOCTYPE html><html lang="ko"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
    <title>칼라박스 샘플 요청 | 에스디컴퍼니</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css"><script src="js/common.js"></script><script src="js/order-pages.js"></script>
    </head><body><script>mountLayout('sample_colorbox.html');</script>
    <main class="section"><div class="container">
    <div class="kicker">Sample Request</div>
    <h1 id="orderTitle">칼라박스 샘플 요청</h1>
    <p class="desc">선택한 박스 이미지를 왼쪽에서 확인하고, 오른쪽에서 필요한 옵션을 입력해 바로 메일 요청을 보낼 수 있습니다.</p>
    <div class="order-layout">
      <section class="order-viewer">
        <div class="order-main-image"><img id="mainBoxImage" src="assets/box-types/color_a.webp" alt="A형 박스"></div>
        <div class="order-thumbs"><button type="button" class="order-thumb active" data-box-image="assets/box-types/color_a.webp" data-box-name="A형 박스"><img src="assets/box-types/color_a.webp" alt="A형 박스"></button><button type="button" class="order-thumb " data-box-image="assets/box-types/color_b.webp" data-box-name="B형 박스"><img src="assets/box-types/color_b.webp" alt="B형 박스"></button><button type="button" class="order-thumb " data-box-image="assets/box-types/color_c.webp" data-box-name="C형 박스"><img src="assets/box-types/color_c.webp" alt="C형 박스"></button><button type="button" class="order-thumb " data-box-image="assets/box-types/color_g.webp" data-box-name="G형 박스"><img src="assets/box-types/color_g.webp" alt="G형 박스"></button><button type="button" class="order-thumb " data-box-image="assets/box-types/color_y.webp" data-box-name="Y형 박스"><img src="assets/box-types/color_y.webp" alt="Y형 박스"></button><button type="button" class="order-thumb " data-box-image="assets/box-types/color_mono.webp" data-box-name="단상자 박스"><img src="assets/box-types/color_mono.webp" alt="단상자 박스"></button><button type="button" class="order-thumb " data-box-image="assets/box-types/color_pillow.webp" data-box-name="필로우 박스"><img src="assets/box-types/color_pillow.webp" alt="필로우 박스"></button><button type="button" class="order-thumb " data-box-image="assets/box-types/color_sleeve.webp" data-box-name="슬리브 박스"><img src="assets/box-types/color_sleeve.webp" alt="슬리브 박스"></button></div>
      </section>
      <section class="order-form-card">
        <div class="guide-card"><div class="guide-icon">📦</div><div><div class="small">박스 주문이 처음이라면?</div><strong id="orderBadge">칼라박스</strong></div></div>
        <form id="mailForm" class="order-form" action="https://formsubmit.co/sales@box.re.kr" method="POST">
          <input type="hidden" name="_subject" id="mailSubject" value="">
          <input type="hidden" name="_captcha" value="false">
          <div class="form-row"><label>박스형태</label><input id="boxShape" name="박스형태" readonly></div>
          <div class="form-row"><label>사용제품</label><input name="사용제품" placeholder="예: 쿠키 세트 / 화장품 키트 / 문구류" required></div>
          
    <div class="form-row"><label>제품무게</label><input name="제품무게" placeholder="예: 300g / 1.2kg"></div>
    <div class="form-row"><label>사이즈(외경)mm</label><div class="field-inline"><input name="가로" placeholder="장(가로)" required><input name="세로" placeholder="폭(세로)" required><input name="높이" placeholder="고(높이)" required></div></div>
    
        <div class="form-row"><label>종이재질</label><select name="종이재질"><option>SC마닐라지</option><option>아이보리지</option><option>MGB지</option><option>로얄아이보리지</option></select></div>
        <div class="form-row"><label>골판지 합지</label><select name="골판지합지유무"><option>없음</option><option>E골 합지</option><option>B골 합지</option></select></div>
        <div class="form-row"><label>인쇄 선택</label><select name="인쇄선택"><option>단면 4도</option><option>양면 4도</option><option>별색 인쇄</option></select></div>
        <div class="form-row"><label>코팅선택</label><select name="코팅선택"><option>코팅안함</option><option>오버코팅</option><option>유광라미</option><option>무광라미</option></select></div>
        <div class="form-row"><label>옵션가공</label><select name="옵션가공"><option>없음</option><option>금박</option><option>은박</option><option>형압</option><option>부분UV</option></select></div>
        
    <div class="form-row"><label>수량</label><input name="수량" placeholder="예: 1000" required></div>
    <div class="form-row"><label>수령방법</label><div class="field-inline two"><select name="수령방법"><option>직접 수령</option><option>택배 발송</option><option>화물 배송</option></select><select name="지게차유무"><option>지게차 없음</option><option>지게차 있음</option></select></div></div>
    <div class="form-row"><label>샘플 용도</label><textarea name="샘플용도" placeholder="샘플을 어떤 목적으로 확인하고 싶은지 적어 주세요."></textarea></div>
          <div class="form-row"><label>성함</label><input name="성함" required></div>
          <div class="form-row"><label>이메일</label><input name="이메일" type="email" required></div>
          <div class="form-row"><label>연락처</label><input name="연락처" placeholder="휴대폰 번호" required></div>
          <div class="form-row"><label>회사명</label><input name="회사명"></div>
          <div class="form-hint">입력한 내용은 메일로 정리되어 sales@box.re.kr 로 전달됩니다.</div>
          <div class="sample-footer-cta"><button id="submitBtn" class="btn primary" type="submit">샘플 요청</button></div>
        </form>
      </section>
    </div>
    </div></main>
    <script>
      mountOrderPage('colorbox','sample');
      attachMailForm('mailForm', '샘플 요청이 전송되었습니다. 확인 후 회신드리겠습니다.');
    </script>
    </body></html>
