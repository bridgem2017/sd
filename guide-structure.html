<script>mountLayout('support.html');document.getElementById('guideTopCards').innerHTML = DATA.guideStructureCards.map(i=>`<article class="card"><img src="${i.img}" alt="${i.name}"><div class="body"><h4>${i.name}</h4></div></article>`).join('');document.getElementById('guideRows').innerHTML = DATA.guideStructureCards.map((i,idx)=>`<article class="guide-detail-card"><div class="body" style="padding:18px"><h4>${idx+1}. ${i.name} <span class="small">최소 제작 수량: ${i.minQty}</span></h4><p>${i.desc}</p></div></article>`).join('');</script></body></html>
