<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>포트폴리오 | 에스디컴퍼니</title><meta name="description" content="에스디컴퍼니 주요 포트폴리오 이미지 모음"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><script src="config/site-config.js"></script><script src="config/site-data.js"></script><script src="js/common.js"></script></head><body><main><section class="section" style="padding-top:34px"><div class="container"><h2 style="font-size:54px">포트폴리오</h2><p class="desc" style="font-size:20px">현재 제작 이미지를 그대로 볼 수 있게 정리했습니다.</p><div class="portfolio-toolbar" style="display:flex;justify-content:space-between;align-items:flex-start;gap:18px;flex-wrap:wrap"><div style="display:flex;flex-direction:column;gap:18px;flex:1"></div><div><a class="btn primary" href="quote.html">견적 문의</a></div></div><div class="grid-4" id="portfolioGrid" style="margin-top:22px"></div></div></section></main><script>mountLayout("portfolio.html");document.getElementById("portfolioGrid").innerHTML=DATA.portfolio.map(item=>`<article class="card"><img src="${item.img}" alt="${item.display||item.title}"><div class="body"><h4>${item.display||item.title}</h4><p>${item.desc}</p><div class="tag-row">${(item.spec||'').split(' / ').filter(t=>t.trim()).map(t=>`<span class="tag">${t.trim()}</span>`).join('')}</div></div></article>`).join("");</script></body></html>
