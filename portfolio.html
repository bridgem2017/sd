<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>포트폴리오</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><script src="config/site-config.js"></script><script src="config/site-data.js"></script><script src="js/common.js"></script></head><body><main><section class="section" style="padding-top:34px"><div class="container"><h2 style="font-size:54px">포트폴리오</h2><p class="desc" style="font-size:20px">산업군과 박스군별로 정렬해 확인할 수 있게 리뉴얼했습니다.</p><div class="portfolio-toolbar"><div style="display:flex;flex-direction:column;gap:16px;flex:1"><div class="tabs" id="familyTabs"></div><div class="tabs" id="industryTabs"></div></div><div style="display:flex;align-items:flex-start"><a class="btn primary" href="quote.html">견적 문의</a></div></div><div class="grid-4" id="portfolioGrid" style="margin-top:22px"></div></div></section></main><script>mountLayout("portfolio.html");const FAMILY=["전체","골판지박스","칼라박스","싸바리박스","기타"];const INDUSTRY=["전체","식품","화장품","패션","의료","교육","물류","쇼핑몰","기타"];let familyFilter="전체",industryFilter="전체";const baseItems=DATA.portfolio.slice();function allItems(){return [...baseItems]}function renderTabs(){document.getElementById("familyTabs").innerHTML=FAMILY.map(f=>`<button class="tab ${familyFilter===f?'active':''}" data-family="${f}">${f}</button>`).join("");document.getElementById("industryTabs").innerHTML=INDUSTRY.map(i=>`<button class="tab ${industryFilter===i?'active':''}" data-industry="${i}">${i}</button>`).join("");document.querySelectorAll("[data-family]").forEach(b=>b.onclick=()=>{familyFilter=b.dataset.family;renderTabs();renderPortfolio()});document.querySelectorAll("[data-industry]").forEach(b=>b.onclick=()=>{industryFilter=b.dataset.industry;renderTabs();renderPortfolio()})}function renderPortfolio(){let items=allItems();if(familyFilter!=="전체") items=items.filter(i=>i.family===familyFilter);if(industryFilter!=="전체") items=items.filter(i=>i.industry===industryFilter);document.getElementById("portfolioGrid").innerHTML=items.map(item=>`<article class="card"><img src="${item.img}" alt="${item.display||item.title}"><div class="body"><h4>${item.display||item.title}</h4><p>${item.desc}</p><div class="tag-row">${(item.spec||'').split(' / ').map(t=>t?`<span class="tag">${t}</span>`:'').join('')}</div></div></article>`).join("")}// admin removed
renderTabs();renderPortfolio();</script></body></html>
