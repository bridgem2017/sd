<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>포트폴리오 | 에스디컴퍼니</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><script src="config/site-config.js"></script><script src="config/site-data.js"></script><script src="js/common.js"></script></head><body><main>
<section class="section" style="padding-top:34px"><div class="container"><h2 style="font-size:54px">포트폴리오</h2><p class="desc" style="font-size:20px">포트폴리오는 저희가 가장 소중히 여기는 고객사 제품 포트폴리오입니다.<br>각 포트폴리오에 담긴 소중한 제작 경험을 확인해 보세요!</p>
<div class="portfolio-toolbar"><div class="tabs" id="typeTabs"><span class="tab active" data-type="전체">전체</span><span class="tab" data-type="종이 박스">종이 박스</span><span class="tab" data-type="골판지 박스">골판지 박스</span><span class="tab" data-type="싸바리 박스">싸바리 박스</span><span class="tab" data-type="기타">기타</span></div><div style="display:flex;gap:10px"><button class="btn line" id="adminToggle">관리자 모드</button><a class="btn primary" href="quote.html">견적 문의</a></div></div>
<div class="upload-panel hidden" id="uploadPanel"><strong>포트폴리오 관리자 업로드</strong><p class="small">정적 사이트 버전이라 업로드한 포트폴리오는 현재 브라우저 localStorage에 저장됩니다. 다른 PC와 공유되는 진짜 관리자 기능은 아닙니다.</p><div class="field-grid" style="margin-top:12px"><div class="field"><label>프로젝트명</label><input id="pTitle"></div><div class="field"><label>설명</label><input id="pDesc"></div><div class="field"><label>스펙 태그</label><input id="pSpec" placeholder="예: 넉다운(D형) / 종이박스 / AB300g"></div><div class="field"><label>이미지 업로드</label><input id="pImage" type="file" accept="image/*"></div><div class="field"><label>분류</label><select id="pType"><option>종이 박스</option><option>골판지 박스</option><option>싸바리 박스</option><option>기타</option></select></div><div class="field"><label>업종</label><select id="pIndustry"><option>식품 / 음료</option><option>화장품</option><option>베이커리 / 카페</option><option>예술 / 여가</option><option>반려동물</option><option>패션 / 소품 / 액세서리</option><option>헬스케어 / 의료</option><option>IT / 기술</option><option>교육 / 연구</option><option>기타</option></select></div></div><div style="margin-top:12px"><button class="btn primary" id="savePortfolio">포트폴리오 저장</button></div></div>
<div class="tabs" style="margin-top:22px" id="industryTabs"><span class="tab active" data-industry="전체">전체</span><span class="tab" data-industry="식품 / 음료">식품 / 음료</span><span class="tab" data-industry="화장품">화장품</span><span class="tab" data-industry="베이커리 / 카페">베이커리 / 카페</span><span class="tab" data-industry="예술 / 여가">예술 / 여가</span><span class="tab" data-industry="반려동물">반려동물</span><span class="tab" data-industry="패션 / 소품 / 액세서리">패션 / 소품 / 액세서리</span><span class="tab" data-industry="헬스케어 / 의료">헬스케어 / 의료</span><span class="tab" data-industry="IT / 기술">IT / 기술</span><span class="tab" data-industry="교육 / 연구">교육 / 연구</span><span class="tab" data-industry="기타">기타</span></div>
<div class="grid-4" id="portfolioGrid" style="margin-top:22px"></div></div></section></main>
<script>
mountLayout('portfolio.html');
const seed = DATA.reviews.map(r=>({title:r[0], desc:r[1], spec:r[2], img:r[3], type:r[4], industry:r[5]}));
let activeType='전체', activeIndustry='전체';
function getPortfolio(){ try{return JSON.parse(localStorage.getItem('sd_portfolio_items')||'[]')}catch(e){return[]} }
function setPortfolio(items){ localStorage.setItem('sd_portfolio_items', JSON.stringify(items)); }
function renderPortfolio(){
  const items=[...getPortfolio(), ...seed].filter(item=>(activeType==='전체'||item.type===activeType)&&(activeIndustry==='전체'||item.industry===activeIndustry));
  document.getElementById('portfolioGrid').innerHTML = items.map(item=>`<article class="card"><img src="${item.img}" alt="${item.title}"><div class="body"><h4>${item.title}</h4><p>${item.desc}</p><div class="tag-row">${(item.spec||'').split(' / ').map(t=>t?`<span class="tag">${t}</span>`:'').join('')}</div></div></article>`).join('');
}
document.querySelectorAll('#typeTabs .tab').forEach(tab=>tab.addEventListener('click',()=>{document.querySelectorAll('#typeTabs .tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); activeType=tab.dataset.type; renderPortfolio();}));
document.querySelectorAll('#industryTabs .tab').forEach(tab=>tab.addEventListener('click',()=>{document.querySelectorAll('#industryTabs .tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); activeIndustry=tab.dataset.industry; renderPortfolio();}));
document.getElementById('adminToggle').addEventListener('click', ()=>{ const pass=prompt('관리자 비밀번호를 입력하세요'); if(pass===CFG.portfolioAdminPassword){ document.getElementById('uploadPanel').classList.toggle('hidden'); } else if(pass!==null){ alert('비밀번호가 다릅니다.'); }});
document.getElementById('savePortfolio').addEventListener('click', ()=>{ const file=document.getElementById('pImage').files[0]; if(!file){ alert('이미지를 선택하세요.'); return; } const reader=new FileReader(); reader.onload=()=>{ const items=getPortfolio(); items.unshift({ title:document.getElementById('pTitle').value||'새 포트폴리오', desc:document.getElementById('pDesc').value||'', spec:document.getElementById('pSpec').value||'', type:document.getElementById('pType').value, industry:document.getElementById('pIndustry').value, img:reader.result }); setPortfolio(items); renderPortfolio(); alert('브라우저에 저장되었습니다.'); }; reader.readAsDataURL(file); });
renderPortfolio();
</script></body></html>
