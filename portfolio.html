<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>포트폴리오 | 에스디컴퍼니</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css">
<script src="config/site-config.js"></script><script src="config/site-data.js"></script><script src="js/common.js"></script></head><body><main>
<section class="section" style="padding-top:34px"><div class="container"><h2 style="font-size:54px">포트폴리오</h2><p class="desc" style="font-size:20px">포트폴리오는 저희가 가장 소중히 여기는 고객사 제품 포트폴리오입니다.<br>각 포트폴리오에 담긴 소중한 제작 경험을 확인해 보세요!</p>
<div class="portfolio-toolbar"><div class="tabs"><span class="tab active">전체</span><span class="tab">종이 박스</span><span class="tab">골판지 박스</span><span class="tab">싸바리 박스</span><span class="tab">기타</span></div><div style="display:flex;gap:10px"><button class="btn line" id="adminToggle">관리자 모드</button><a class="btn primary" href="quote.html">견적 문의</a></div></div>
<div class="upload-panel hidden" id="uploadPanel"><strong>포트폴리오 관리자 업로드</strong><p class="small">정적 사이트 버전이라 업로드한 포트폴리오는 현재 브라우저 localStorage에 저장됩니다. 다른 PC와 공유되는 진짜 관리자 기능은 아닙니다.</p><div class="field-grid" style="margin-top:12px"><div class="field"><label>프로젝트명</label><input id="pTitle"></div><div class="field"><label>설명</label><input id="pDesc"></div><div class="field"><label>스펙 태그</label><input id="pSpec" placeholder="예: 넉다운(D형) / 종이박스 / AB300g"></div><div class="field"><label>이미지 업로드</label><input id="pImage" type="file" accept="image/*"></div></div><div style="margin-top:12px"><button class="btn primary" id="savePortfolio">포트폴리오 저장</button></div></div>
<div class="tabs" style="margin-top:22px"><span class="tab">식품 / 음료</span><span class="tab">화장품</span><span class="tab">베이커리 / 카페</span><span class="tab">예술 / 여가</span><span class="tab">반려동물</span><span class="tab">패션 / 소품 / 액세서리</span><span class="tab">헬스케어 / 의료</span><span class="tab">IT / 기술</span><span class="tab">교육 / 연구</span><span class="tab">기타</span></div>
<div class="grid-4" id="portfolioGrid" style="margin-top:22px"></div></div></section></main>
<script>
mountLayout('portfolio.html');
const basePortfolio = DATA.reviews.map(r=>({title:r[0], desc:r[1], spec:r[2], img:r[3]}));
function getPortfolio(){ try{return JSON.parse(localStorage.getItem('sd_portfolio_items')||'[]')}catch(e){return[]} }
function setPortfolio(items){ localStorage.setItem('sd_portfolio_items', JSON.stringify(items)); }
function renderPortfolio(){ const items=[...getPortfolio(), ...basePortfolio]; document.getElementById('portfolioGrid').innerHTML = items.map(item=>`<article class="card"><img src="${item.img}" alt="${item.title}"><div class="body"><h4>${item.title}</h4><p>${item.desc}</p><div class="tag-row">${(item.spec||'').split(' / ').map(t=>t?`<span class="tag">${t}</span>`:'').join('')}</div></div></article>`).join(''); }
document.getElementById('adminToggle').addEventListener('click', ()=>{ const pass=prompt('관리자 비밀번호를 입력하세요'); if(pass===CFG.portfolioAdminPassword){ document.getElementById('uploadPanel').classList.toggle('hidden'); } else if(pass!==null){ alert('비밀번호가 다릅니다.'); }});
document.getElementById('savePortfolio').addEventListener('click', ()=>{ const file=document.getElementById('pImage').files[0]; if(!file){ alert('이미지를 선택하세요.'); return; } const reader=new FileReader(); reader.onload=()=>{ const items=getPortfolio(); items.unshift({ title:document.getElementById('pTitle').value||'새 포트폴리오', desc:document.getElementById('pDesc').value||'', spec:document.getElementById('pSpec').value||'', img:reader.result }); setPortfolio(items); renderPortfolio(); alert('브라우저에 저장되었습니다.'); }; reader.readAsDataURL(file); });
renderPortfolio();
</script></body></html>
