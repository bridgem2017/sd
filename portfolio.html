<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>포트폴리오</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><script src="config/site-config.js"></script><script src="config/site-data.js"></script><script src="js/common.js"></script></head><body><main><section class="section" style="padding-top:34px"><div class="container"><h2 style="font-size:54px">포트폴리오</h2><p class="desc" style="font-size:20px">산업군과 박스군별로 정렬해 확인할 수 있게 리뉴얼했습니다.</p><div class="portfolio-toolbar"><div class="tabs" id="familyTabs"></div><div style="display:flex;gap:10px"><button class="btn line" id="adminToggle">관리자 모드</button><a class="btn primary" href="quote.html">견적 문의</a></div></div><div class="tabs" id="industryTabs" style="margin-top:22px"></div><div class="upload-panel hidden" id="uploadPanel"><strong>포트폴리오 관리자 업로드</strong><p class="small">정적 사이트 버전이라 업로드한 포트폴리오는 현재 브라우저 localStorage에 저장됩니다.</p><div class="field-grid" style="margin-top:12px"><div class="field"><label>표시 상호/산업명</label><input id="pDisplay"></div><div class="field"><label>설명</label><input id="pDesc"></div><div class="field"><label>스펙 태그</label><input id="pSpec" placeholder="예: 넉다운(D형) / 종이박스 / AB300g"></div><div class="field"><label>패밀리</label><select id="pFamily"><option>종이 박스</option><option>골판지 박스</option><option>싸바리 박스</option><option>기타</option></select></div><div class="field"><label>산업군</label><select id="pIndustry"><option>식품 / 음료</option><option>화장품</option><option>베이커리 / 카페</option><option>예술 / 여가</option><option>반려동물</option><option>패션 / 소품 / 액세서리</option><option>헬스케어 / 의료</option><option>IT / 기술</option><option>교육 / 연구</option><option>물류 / 운수</option><option>기타</option></select></div><div class="field"><label>이미지 업로드</label><input id="pImage" type="file" accept="image/*"></div></div><div style="margin-top:12px"><button class="btn primary" id="savePortfolio">포트폴리오 저장</button></div></div><div class="grid-4" id="portfolioGrid" style="margin-top:22px"></div></div></section></main><script>mountLayout("portfolio.html");const FAMILY=["전체","종이 박스","골판지 박스","싸바리 박스","기타"];const INDUSTRY=["전체","식품 / 음료","화장품","베이커리 / 카페","예술 / 여가","반려동물","패션 / 소품 / 액세서리","헬스케어 / 의료","IT / 기술","교육 / 연구","물류 / 운수","기타"];let familyFilter="전체",industryFilter="전체";const baseItems=DATA.portfolio.slice();function getPortfolio(){try{return JSON.parse(localStorage.getItem("sd_portfolio_items")||"[]")}catch(e){return[]}}function setPortfolio(items){localStorage.setItem("sd_portfolio_items",JSON.stringify(items))}function allItems(){return[...getPortfolio(),...baseItems]}function renderTabs(){document.getElementById("familyTabs").innerHTML=FAMILY.map(f=>`<button class="tab ${familyFilter===f?'active':''}" data-family="${f}">${f}</button>`).join("");document.getElementById("industryTabs").innerHTML=INDUSTRY.map(i=>`<button class="tab ${industryFilter===i?'active':''}" data-industry="${i}">${i}</button>`).join("");document.querySelectorAll("[data-family]").forEach(b=>b.onclick=()=>{familyFilter=b.dataset.family;renderTabs();renderPortfolio()});document.querySelectorAll("[data-industry]").forEach(b=>b.onclick=()=>{industryFilter=b.dataset.industry;renderTabs();renderPortfolio()})}function renderPortfolio(){let items=allItems();if(familyFilter!=="전체") items=items.filter(i=>i.family===familyFilter);if(industryFilter!=="전체") items=items.filter(i=>i.industry===industryFilter);document.getElementById("portfolioGrid").innerHTML=items.map(item=>`<article class="card"><img src="${item.img}" alt="${item.display||item.title}"><div class="body"><h4>${item.display||item.title}</h4><p>${item.desc}</p><div class="tag-row">${(item.spec||'').split(' / ').map(t=>t?`<span class="tag">${t}</span>`:'').join('')}</div></div></article>`).join("")}document.getElementById("adminToggle").onclick=()=>{const pass=prompt("관리자 비밀번호를 입력하세요");if(pass===CFG.portfolioAdminPassword){document.getElementById("uploadPanel").classList.toggle("hidden")}else if(pass!==null){alert("비밀번호가 다릅니다.")}};document.getElementById("savePortfolio").onclick=()=>{const file=document.getElementById("pImage").files[0];if(!file){alert("이미지를 선택하세요.");return}const reader=new FileReader();reader.onload=()=>{const items=getPortfolio();items.unshift({display:document.getElementById("pDisplay").value||"신규 포트폴리오",title:document.getElementById("pDisplay").value||"신규 포트폴리오",desc:document.getElementById("pDesc").value||"",spec:document.getElementById("pSpec").value||"",family:document.getElementById("pFamily").value,industry:document.getElementById("pIndustry").value,img:reader.result});setPortfolio(items);renderPortfolio();alert("브라우저에 저장되었습니다.")};reader.readAsDataURL(file)};renderTabs();renderPortfolio();</script></body></html>
