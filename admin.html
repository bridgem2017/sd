<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SD 관리자 도구</title><link rel="stylesheet" href="styles.css"><script src="js/common.js"></script></head><body><main class="section"><div class="container"><div class="kicker">ADMIN TOOL</div><h1>홈페이지 배너/로고 관리</h1><p class="desc">이 페이지는 링크로 노출되지 않는 관리자 전용 도구입니다. 정적 사이트 구조라서 변경 내용은 현재 브라우저에만 저장됩니다.</p><div class="form-panel" style="max-width:980px"><div class="field-grid"><div class="field-full"><label>관리자 비밀번호</label><input id="adminPw" type="password" placeholder="비밀번호 입력"></div></div><div class="hero-actions"><a class="btn primary" href="#" id="unlockBtn">열기</a><a class="btn line" href="#" id="resetBtn">저장값 초기화</a></div></div><div id="adminPanel" class="hidden" style="margin-top:20px"></div></div></main><script>
const KEY='SD_ADMIN_OVERRIDES_V1';
const PASS='sdcompany-admin';
function readOv(){try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){return {}}}
function saveOv(ov){localStorage.setItem(KEY, JSON.stringify(ov)); alert('저장되었습니다. 같은 브라우저에서 사이트를 새로고침하면 반영됩니다.');}
function fileToDataUrl(file, cb){const fr=new FileReader(); fr.onload=()=>cb(fr.result); fr.readAsDataURL(file);}
function renderAdmin(){const ov=readOv(); const banners=ov.banners || [{},{},{}]; const panel=document.getElementById('adminPanel'); panel.classList.remove('hidden'); panel.innerHTML=`<div class="form-panel"><h3>상단/푸터 로고</h3><div class="field-grid"><div class="field"><label>상단 로고 업로드</label><input type="file" id="siteLogoFile" accept="image/*"></div><div class="field"><label>푸터 로고 업로드</label><input type="file" id="footerLogoFile" accept="image/*"></div></div></div>` + banners.map((b,i)=>`<div class="form-panel" style="margin-top:18px"><h3>배너 ${i+1}</h3><div class="field-grid"><div class="field"><label>배지</label><input id="badge${i}" value="${b.badge||''}"></div><div class="field"><label>링크</label><input id="link${i}" value="${b.link||''}"></div><div class="field-full"><label>제목</label><input id="title${i}" value="${b.title||''}"></div><div class="field-full"><label>서브 문구(줄바꿈은 엔터)</label><textarea id="sub${i}" rows="3">${b.sub||''}</textarea></div><div class="field-full"><label>배너 이미지 업로드</label><input type="file" id="img${i}" accept="image/*"></div></div></div>`).join('') + `<div class="hero-actions" style="margin-top:18px"><a class="btn primary" href="#" id="saveAdmin">저장</a></div>`;
 document.getElementById('saveAdmin').onclick=(e)=>{e.preventDefault(); const next=readOv(); next.banners=[0,1,2].map(i=>({badge:document.getElementById('badge'+i).value,title:document.getElementById('title'+i).value,sub:document.getElementById('sub'+i).value,link:document.getElementById('link'+i).value,image:(next.banners&&next.banners[i]&&next.banners[i].image)||''})); saveOv(next);};
 document.getElementById('siteLogoFile').onchange=e=>{const f=e.target.files[0]; if(!f)return; fileToDataUrl(f, data=>{const next=readOv(); next.siteLogo=data; localStorage.setItem(KEY, JSON.stringify(next)); alert('상단 로고 저장');});};
 document.getElementById('footerLogoFile').onchange=e=>{const f=e.target.files[0]; if(!f)return; fileToDataUrl(f, data=>{const next=readOv(); next.footerLogo=data; localStorage.setItem(KEY, JSON.stringify(next)); alert('푸터 로고 저장');});};
 [0,1,2].forEach(i=>{ const inp=document.getElementById('img'+i); inp.onchange=e=>{const f=e.target.files[0]; if(!f)return; fileToDataUrl(f, data=>{const next=readOv(); next.banners=next.banners||[{},{},{}]; next.banners[i]=next.banners[i]||{}; next.banners[i].image=data; localStorage.setItem(KEY, JSON.stringify(next)); alert('배너 이미지 저장');});};});
}
document.getElementById('unlockBtn').onclick=(e)=>{e.preventDefault(); if(document.getElementById('adminPw').value===PASS){renderAdmin()} else alert('비밀번호가 다릅니다.');};
document.getElementById('resetBtn').onclick=(e)=>{e.preventDefault(); localStorage.removeItem(KEY); alert('저장값이 삭제되었습니다.');};
</script></body></html>
