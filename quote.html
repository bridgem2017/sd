<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>견적 문의</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><script src="config/site-config.js"></script><script src="config/site-data.js"></script><script src="js/common.js"></script></head><body><main class="section" style="padding-top:32px"><div class="container"><h2>견적 문의</h2><p class="desc">필요한 항목만 선택해 메일 전송</p><div class="quote-layout"><div class="form-panel"><h3>1. 상품종류*</h3><div class="radio-pills"><label><input type="radio" name="productType" value="골판지 박스" checked> 골판지 박스</label><label><input type="radio" name="productType" value="칼라박스"> 칼라박스</label><label><input type="radio" name="productType" value="싸바리박스"> 싸바리박스</label><label><input type="radio" name="productType" value="쇼핑백"> 쇼핑백</label><label><input type="radio" name="productType" value="기타"> 기타</label></div><div style="margin-top:14px" class="choice-grid" id="quoteChoices"></div><h3 style="margin-top:28px">2. 박스 내부 크기*</h3><div class="field-grid"><div class="field"><label>가로(mm)</label><input id="sizeW"></div><div class="field"><label>세로(mm)</label><input id="sizeL"></div><div class="field"><label>높이(mm)</label><input id="sizeH"></div><div class="field"><label>주문 수량*</label><input id="qty"></div></div><h3 style="margin-top:28px">3. 인쇄 옵션</h3><div class="field-grid"><div class="field"><label>외부 인쇄</label><select id="outerPrint"><option>없음</option><option>1도</option><option>2도</option><option>4도</option></select></div><div class="field"><label>내부 인쇄</label><select id="innerPrint"><option>없음</option><option>1도</option><option>2도</option><option>4도</option></select></div><div class="field"><label>외부 재질</label><select id="outerMaterial"><option>화이트</option><option>크라프트</option></select></div><div class="field"><label>내부 재질</label><select id="innerMaterial"><option>화이트</option><option>크라프트</option></select></div></div><h3 style="margin-top:28px">4. 문의자 정보</h3><form id="quoteForm" class="field-grid" action="https://formsubmit.co/sales@box.re.kr" method="POST" enctype="multipart/form-data"><div class="field"><label>이름*</label><input name="name" required></div><div class="field"><label>이메일*</label><input name="email" type="email" required></div><div class="field"><label>전화번호*</label><input name="phone" required></div><div class="field"><label>회사 이름</label><input name="company"></div><div class="field"><label>제품 업종</label><input name="industry"></div><div class="field"><label>유입 경로</label><input name="source"></div><div class="field-full"><label>포장물 제품 설명</label><textarea name="product_desc" rows="4"></textarea></div><div class="field-full"><label>참고 자료 업로드 (AI/PDF/PNG/JPG/DOCX/PPT 등)</label><input name="attachment" type="file" accept=".ai,.pdf,.png,.jpg,.jpeg,.doc,.docx,.ppt,.pptx,.zip"></div><div class="field-full"><div class="summary-box" id="summaryBox"></div></div><input type="hidden" name="_subject" value="[에스디컴퍼니] 홈페이지 견적문의"><input type="hidden" name="_captcha" value="false"><input type="hidden" name="selected_summary" id="selectedSummaryInput"><div class="field-full"><button class="btn primary" type="submit" style="width:100%">제출하기 →</button></div></form></div><div class="form-panel"><img src="assets/guides/guide-quote.png" alt="견적 문의 가이드" style="width:100%;border-radius:16px;border:1px solid var(--line)"><div class="note-box"><strong>자동 메일 발송 안내</strong><p class="small">문의는 sales@box.re.kr 로 전송됩니다. 첫 1회는 FormSubmit 인증이 필요할 수 있습니다.</p></div></div></div></div></main><script>mountLayout("quote.html");const quoteChoices=[...DATA.corrugatedProducts.slice(0,2),...DATA.paperProducts.slice(0,2),DATA.rigidProducts[0]];document.getElementById("quoteChoices").innerHTML=quoteChoices.map((p,idx)=>`<label class="choice-card"><img src="${p.img}" alt="${p.name}"><div><input ${idx===0?'checked':''} type="radio" name="choiceCard" value="${p.name}" style="margin-right:6px">${p.name}</div></label>`).join("");function updateSummary(){const productType=document.querySelector('input[name="productType"]:checked')?.value||'';const choice=document.querySelector('input[name="choiceCard"]:checked')?.value||'';const text=[`상품종류: ${productType}`,`선택 형태: ${choice}`,`박스 내부 크기: ${document.getElementById("sizeW").value||"-"} × ${document.getElementById("sizeL").value||"-"} × ${document.getElementById("sizeH").value||"-"} mm`,`주문 수량: ${document.getElementById("qty").value||"-"}`,`외부 인쇄: ${document.getElementById("outerPrint").value}`,`내부 인쇄: ${document.getElementById("innerPrint").value}`,`외부 재질: ${document.getElementById("outerMaterial").value}`,`내부 재질: ${document.getElementById("innerMaterial").value}`].join("\n");document.getElementById("summaryBox").textContent=text;document.getElementById("selectedSummaryInput").value=text}document.querySelectorAll("input,select,textarea").forEach(i=>i.addEventListener("input",updateSummary));updateSummary();</script></body></html>
